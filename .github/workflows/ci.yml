name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tumbl:ci .

      - name: Run tests
        run: docker run --rm tumbl:ci python -m unittest discover -s tests -v
