{% extends "base.html" %}

{% block title %}{{ page_title }} | {{ blog_title }}{% endblock %}

{% block head_meta %}
<link rel="canonical" href="{{ share_url }}">
<meta property="og:url" content="{{ share_url }}">
<meta property="og:title" content="{{ page_title }} | {{ blog_title }}">
<meta property="og:site_name" content="{{ blog_title }}">
<meta property="og:type" content="article">
{% if og_description %}
<meta property="og:description" content="{{ og_description }}">
<meta name="twitter:description" content="{{ og_description }}">
{% endif %}
{% if og_image %}
<meta property="og:image" content="{{ og_image }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ og_image }}">
{% else %}
<meta name="twitter:card" content="summary">
{% endif %}
{% endblock %}

{% block content %}
<p class="back-link-wrap"><a class="back-link" href="{{ url_for('feed') }}">&larr; Back to blog</a></p>

<section
    class="post-feed single-post-view"
    data-prev-post-id="{{ prev_post_id or '' }}"
    data-next-post-id="{{ next_post_id or '' }}"
>
    {% include "post_card.html" %}
</section>
{% endblock %}
