{% extends "base.html" %}

{% block title %}Loading {{ blog_title }}{% endblock %}

{% block content %}
<section class="loading-panel">
    <h1>Loading archive…</h1>
    <p id="loading-status">Parsing posts from your Tumblr backup. This may take a few minutes on first load.</p>
    <div class="loading-progress" id="loading-progress" hidden>
        <div class="loading-progress-bar" id="loading-progress-bar"></div>
    </div>
    <p class="loading-progress-label" id="loading-progress-label" hidden></p>
</section>
{% endblock %}
